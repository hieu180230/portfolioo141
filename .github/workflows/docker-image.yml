name: Docker Bridge
permissions:
  contents: read
  
on:    
  push:
    branches: [ "main" ]
    paths:
      - 'portfolio/**'
      - 'portfolio-be/**'
  # pull_request:
  #   branches: [ "main" ]
  #   paths:
  #     - 'portfolio/**'
  #     - 'portfolio-be/**'

jobs:
  publish_images:
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.tag_generator.outputs.IMAGE_TAG }}

    steps:
    - name: Set current date as variable
      run: |
        DATE=$(date +'%Y-%m-%d')
        SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-7)
        echo "IMAGE_TAG=$DATE-$SHORT_SHA" >> $GITHUB_ENV
        
    - name: checkout
      uses: actions/checkout@v4
    
    - name: Set up QEMU
      uses: docker/setup-qemu-action@v3

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      
    - name: Login to Docker Hub
      uses: docker/login-action@v3
      with:
        username: "hieu18022004"
        password: ${{ secrets.DOCKER_HUB }}

    - name: Build and Push Frontend to Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: ./portfolio/
        file: ./portfolio/Dockerfile
        platforms: linux/arm64 # The exact architecture your cloud needs
        push: true
        tags: hieu18022004/portfolioo141:${{ env.IMAGE_TAG }}
        cache-from: type=gha,scope=frontend
        cache-to: type=gha,mode=max,scope=frontend

    - name: Build and Push Backend to Docker Hub
      uses: docker/build-push-action@v5
      with:
        context: ./portfolio-be/
        file: ./portfolio-be/Dockerfile
        platforms: linux/arm64
        push: true
        tags: hieu18022004/portfolioo141-be:${{ env.IMAGE_TAG }}
        cache-from: type=gha,scope=backend
        cache-to: type=gha,mode=max,scope=backend
    
    - name: Write Docker Image tag to file
      run: |
        mkdir -p ./image_tag
        echo ${{ env.IMAGE_TAG }} > ./image_tag/tag
        
    - name: Upload Docker Image tag to Artifact
      uses: actions/upload-artifact@v4
      with:
        name: tag
        path: image_tag/
        retention-days: 1
