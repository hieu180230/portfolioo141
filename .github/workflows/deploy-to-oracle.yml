name: Oracle Cloud CD
permissions:
  contents: read
  actions: read

on:
  workflow_run:
    workflows: [Docker Image CI]
    types:
      - completed

jobs:
  deploy_images:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    
    steps:
      - name: Download Docker Image tag
        uses: actions/download-artifact@v3.1.0
        with:
          name: tag
          path: image_tag/
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read Tag into Variable
        id: read_tag
        run: |
          TAG=$(cat image_tag/tag)
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
          echo "Downloaded tag: $TAG"

      - name: Deploy to Oracle Cloud
        uses: appleboy/ssh-action@v1.0.3
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USERNAME }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          envs: IMAGE_TAG
          script: |
            echo "Initiating deployment for hieu18022004/portfolioo141:$IMAGE_TAG"
            kubectl set image deployment/p-deployment portfolioo141=hieu18022004/portfolioo141:$IMAGE_TAG
            kubectl rollout status deployment/p-deployment
          
  
